<script>
// Matrix effekti endi sahifani yopib qo'ymaydi
function startMatrix() {
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "01010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; // Harflar orqasidan iz qoldiradi
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);
}

// Terminal logikasi (hack buyrug'i uchun)
document.getElementById('terminal-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const cmd = this.value.toLowerCase().trim();
        if (cmd === 'hack') {
            startMatrix(); // Faqat orqa fonda ishga tushadi
            const res = document.createElement('div');
            res.innerHTML = "<span style='color:#0f0'>Access Granted! Matrix orqa fonda yoqildi...</span>";
            document.getElementById('terminal-screen').insertBefore(res, this.parentElement);
        }
        this.value = '';
    }
});
</script>
